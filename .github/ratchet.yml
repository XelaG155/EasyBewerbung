# Ratchet plan — enforced by .github/workflows/check-ratchet.py
#
# The CI test job runs check-ratchet.py against this file. When the
# wall-clock date passes a milestone here but the corresponding gate
# in .github/workflows/test.yml has not been bumped, CI fails with a
# clear error message.
#
# The two ways to keep CI green:
#   (a) Land the work that justifies the ratchet step and bump the
#       gate in test.yml.
#   (b) Move the date here and document the slip in quality_log.md
#       in the same PR.
#
# Either way the plan stays honest. The Iteration-5 testing audit
# finding "documented plan but not self-enforcing" is closed by this
# file.

