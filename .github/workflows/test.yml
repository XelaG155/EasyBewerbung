name: Test Suite

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  backend-unit:
    name: Backend unit + integration (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: easybewerbung
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: easybewerbung_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U easybewerbung -d easybewerbung_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      # SQLite is the default for the unit suite — fast, no DB needed.
      # The integration suite gates on EASYBEWERBUNG_TEST_POSTGRES_URL and
      # only runs when set (see backend/tests/integration/test_postgres_migration.py).
      DATABASE_URL: sqlite:///./test.db
      EASYBEWERBUNG_TEST_POSTGRES_URL: postgresql://easybewerbung:testpass@localhost:5432/easybewerbung_test
      REDIS_URL: redis://localhost:6379/0
      # ⚠️ THIS IS A PLACEHOLDER, NOT A REAL SECRET ⚠️
      # The real production SECRET_KEY lives only in the host's .env file
      # (see ~/EasyBewerbung/.env on the deploy box) and is NEVER committed.
      # This literal value is used only when ENVIRONMENT=test (set below),
      # which disables the production guard in app/auth.py. Tokens signed
      # with this string would be rejected by the production process even
      # if leaked, because production uses a different secret entirely.
      SECRET_KEY: easybewerbung-ci-test-only-not-a-real-secret
      ENVIRONMENT: test
      # LLM keys intentionally absent — LlmProviderUnavailable tests rely on this.

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps for weasyprint
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz-subset0 libffi-dev libmagic1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit + integration tests with coverage
        # Coverage gate ratchet plan (each step is a deliberate PR):
        #
        #   - 2026-04-26: gate raised 55 → 58 (current; actual 59%).
        #   - 2026-05-15: gate → 60 once tasks.py orphan paths
        #     (``calculate_matching_score_task`` settle path,
        #     ``generate_documents_task`` happy path) get smoke tests.
        #   - 2026-06-15: gate → 65 once admin.py LLM-sync round-trip
        #     and document_templates routes have HTTP-layer tests.
        #   - 2026-07-15: gate → 75 (pilot-readiness target).
        #
        # The dates and step sizes are dated commitments, not aspirations.
        # If a step slips, document the new date in quality_log.md and
        # in this comment in the same PR.
        run: |
          pytest -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=58 \
            tests/

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml
          retention-days: 14

      - name: Enforce ratchet milestones
        # Fails CI when a wall-clock milestone in .github/ratchet.yml
        # has passed but the gate in this workflow file has not been
        # bumped to match. Gives the testing-audit "ratchet without
        # enforcement" finding a real teeth.
        run: python3 .github/workflows/check-ratchet.py
        working-directory: ${{ github.workspace }}

  frontend-check:
    name: Frontend lint + type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      # ESLint is blocking. Pre-existing rule violations were downgraded
      # to warnings via eslint.config.mjs so the suite runs at zero
      # errors. The warning ceiling is the ratchet:
      #
      #   - 2026-04-26: ceiling 95 (current; actual ~78–89 across runs).
      #   - 2026-05-15: ceiling 80 once react-hooks/set-state-in-effect
      #     refactor lands in dashboard/page.tsx + admin/documents.
      #   - 2026-06-15: ceiling 50 once @typescript-eslint/no-explicit-any
      #     gets removed from lib/api.ts and i18n-context.tsx.
      #   - 2026-07-15: ceiling 0 — full sweep, override-block in
      #     eslint.config.mjs removed.
      #
      # Each step is a dated commitment. If slipped, update the dates in
      # this comment and quality_log.md in the same PR.
      - name: ESLint (blocking, with warning ceiling)
        run: npm run lint -- --max-warnings 95
